$schema: "http://json-schema.org/draft-07/schema#"
title: Experiment
description: >-
  A reusable, prepared procedure designed to test a Hypothesis and produce
  empirical Findings. Each execution yields one or more Finding documents.

  Use Experiment when you need a reproducible test procedure. Do NOT use
  Experiment for ad-hoc observations (write a Finding directly) or for
  operational workflows (use Playbook).

  The Experiment template itself is mutable while in `proposed` or `active`
  status. Once `retired` or `superseded`, it should not be modified.
  Outcomes are recorded as separate Finding documents, not by editing the
  Experiment.

  Belongs to the Testing layer. Tests Hypotheses. Produces Findings. May be
  superseded by improved experimental designs.
allOf:
  - $ref: "Base.schema.yaml"
  - type: object
    properties:
      type:
        description: Document type — must be "Experiment".
        type: string
        const: Experiment
      hypothesis:
        description: The claim the experiment is designed to confirm or falsify.
        type: string
        minLength: 1
      steps:
        description: Ordered procedure to run the experiment reproducibly.
        type: array
        items: { type: string }
        minItems: 1
      expected_signals:
        description: Observable signals that indicate the hypothesis holds or fails.
        type: array
        items: { type: string }
      max_runs:
        description: How many times this experiment is meant to be run (typically 1–2).
        type: integer
        minimum: 1
      status:
        description: Lifecycle state of the experiment template.
        type: string
        enum: [proposed, active, retired, superseded]
      derived_findings:
        description: IDs of Findings produced by running this experiment.
        type: array
        items: { type: string }
      superseded_by:
        description: IDs of documents that supersede this experiment.
        type: array
        items: { type: string }
    required: [type, hypothesis, steps]

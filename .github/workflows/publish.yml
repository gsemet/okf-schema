name: Publish

on:
  release:
    types: [published]

jobs:
  preflight:
    uses: ./.github/workflows/ci.yml

  publish:
    needs: preflight
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/okf-schema
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "latest"

      - name: Build package
        run: uv build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

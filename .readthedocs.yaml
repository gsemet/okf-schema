# Read the Docs configuration file
# See https://docs.readthedocs.io/en/stable/config-file/v2.html for details

version: 2

build:
  os: ubuntu-24.04
  tools:
    python: "3.13"
  jobs:
    post_checkout:
      - git fetch --tags
      - git lfs install
      - git lfs fetch
      - git lfs checkout
    pre_build:
      - uv run cz changelog

sphinx:
  configuration: docs/source/conf.py

python:
  install:
    - method: uv
      command: sync
      groups:
        - dev

# Read the Docs configuration file
# See https://docs.readthedocs.io/en/stable/config-file/v2.html for details

version: 2

build:
  os: ubuntu-24.04
  tools:
    python: "3.13"
  jobs:
    post_checkout:
      - git fetch --tags
      # Download and uncompress git-lfs binary
      - wget https://github.com/git-lfs/git-lfs/releases/download/v3.6.1/git-lfs-linux-amd64-v3.6.1.tar.gz
      - tar xvfz git-lfs-linux-amd64-v3.6.1.tar.gz
      - cp git-lfs-*/git-lfs ./git-lfs
      # Configure LFS to use the downloaded binary
      - git config filter.lfs.process "`pwd`/git-lfs filter-process"
      - git config filter.lfs.smudge "`pwd`/git-lfs smudge -- %f"
      - git config filter.lfs.clean "`pwd`/git-lfs clean -- %f"
      # Make LFS available in the current repository and fetch/check out content
      - ./git-lfs install
      - ./git-lfs fetch
      - ./git-lfs checkout
    pre_build:
      - uv run cz changelog

sphinx:
  configuration: docs/source/conf.py

python:
  install:
    - method: uv
      command: sync
      groups:
        - dev
